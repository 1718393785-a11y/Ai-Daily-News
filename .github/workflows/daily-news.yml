name: AI Daily News Generator

on:
  schedule:
    # 每天早上9点运行 (UTC时间 1:00 = 北京时间 9:00)
    - cron: '0 1 * * *'

  # 手动触发
  workflow_dispatch:

jobs:
  generate-daily-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: ./combined-daily
        run: npm install

      - name: Generate daily news
        working-directory: ./combined-daily
        run: node daily_news.js

      - name: Keep only latest 20 reports
        run: |
          cd combined-daily/digests || exit 0
          ls -t ai-daily-*.md 2>/dev/null | tail -n +21 | xargs -r rm -f
          echo "✅ 保留最新20份日报，清理完成"

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 检查是否有变更
          if [ -n "$(git status --porcelain)" ]; then
            git add combined-daily/digests/*.md 2>/dev/null || true
            git commit -m "docs: 自动生成 $(date +%Y-%m-%d) AI日报" || true
            git push
            echo "✅ 日报已生成并提交"
          else
            echo "✅ 无变更，无需提交"
          fi
